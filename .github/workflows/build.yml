name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y -qq openjdk-17-jdk-headless libffi-dev libssl-dev autoconf libtool

    - name: Install Python dependencies
      run: |
        pip install buildozer cython

    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tindichtruyen-apk
        path: bin/*.apk
        if-no-files-found: error
